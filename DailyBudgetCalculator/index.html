<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="style.css">


    <title>Calculator of Daily Budget</title>
  </head>


  <body>
       <!-- Main panel -->
      <div class="wrapper clearfix">

          <!-- Left block -->
          <div class="left-block">

            <!-- Income -->
            <div class="salary">
              <form id="monthly-salary">
                <p>
                  <label>Monthly salary</label>:<br>
                  <input type="text" name="fullName">
                </p>
                <p>
                  <input type="submit" value="Submit">
                </p>
              </form>
            </div>
            <div class="salary">
              <form id="additional-money">
                <p>
                  <label>Additional money</label>:<br>
                  <input type="text" name="fullName">
                </p>
                <p>
                  <input type="submit" value="Submit">
                </p>
              </form>
            </div>


            <!-- Mandatory Costs -->
            <div class="mandatory_costs">

            </div>

          </div>


          <!-- Right block -->
          <div class="right-block">

            <!-- Daily budget window -->
            <div class="daily-budget">

            </div>

          </div>

      </div>

      <script src="app.js"></script>
  </body>
</html>
